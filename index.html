 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>spotting</title>
    <style>
        /* إعدادات الصفحة العامة */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0b1416; /* لون خلفية مظلم */
            color: white;
            overflow-x: hidden; /* يمنع التمرير الأفقي غير المرغوب فيه */
        }

        /* شريط التنقل العلوي */
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #1e3a2f; /* تم تغيير اللون هنا إلى أخضر هادئ وافتح قليلاً متناسق مع الوضع المظلم */
            padding: 10px 16px;
            height: 48px;
            box-sizing: border-box;
            border-bottom: 1px solid #2d5a47;
            position: relative;
            z-index: 10;
        }

        /* جهة اليمين: زر البحث */
        .right-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .search-btn {
            background: none;
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
        }

        /* الشعار في المنتصف تماماً */
        .logo-container {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .logo-img {
            height: 32px; /* حجم الشعار */
            width: auto;
            display: block;
            border-radius: 4px;
        }

        /* زر القائمة على اليسار */
        .menu-btn {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            width: 24px;
            height: 18px;
            padding: 0;
        }

        .menu-btn span {
            width: 100%;
            height: 2px;
            background-color: white;
            border-radius: 2px;
            display: block;
        }

        /* --- تصميم القائمة الجانبية (Sidebar) --- */
        .sidebar {
            position: fixed;
            top: 0;
            right: -280px; /* مخفية خارج الشاشة جهة اليمين */
            width: 280px;
            height: 100%;
            background-color: #0b1416;
            border-left: 1px solid #2a3c42;
            box-shadow: -5px 0 15px rgba(0,0,0,0.5);
            transition: right 0.3s ease; /* حركة انزلاق ناعمة */
            z-index: 999; /* تظهر فوق كل العناصر */
            box-sizing: border-box;
            padding: 20px;
        }

        /* عندما يتم فتح القائمة */
        .sidebar.open {
            right: 0; /* تتحرك لتظهر داخل الشاشة */
        }

        /* زر إغلاق القائمة الجانبية */
        .close-btn {
            background: none;
            border: none;
            color: #8797a1;
            font-size: 24px;
            cursor: pointer;
            float: left; /* يضع الزر في يسار القائمة */
        }

        /* محتوى منتصف القائمة الجانبية */
        .sidebar-content {
            display: flex;
            height: 80%;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .under-construction {
            font-size: 20px;
            color: #ff9f43; /* لون برتقالي مميز للفت الانتباه */
            font-weight: bold;
        }

        /* طبقة خلفية مظلمة عند فتح القائمة */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            z-index: 998;
        }

        .overlay.show {
            display: block;
        }
    </style>
</head>
<body>

    <!-- شريط التنقل العلوي مرتب برمجياً بشكل صحيح من اليمين لليسار -->
    <nav class="navbar">
        <!-- 1. أيقونة البحث (يمين) -->
        <div class="right-section">
            <button class="search-btn" aria-label="بحث">🔍</button>
        </div>

        <!-- 2. الشعار الخاص بك في المنتصف -->
        <div class="logo-container">
            <img src="IMG_20260621_083902.jpg" alt="Logo" class="logo-img">
        </div>

        <!-- 3. زر القائمة (يسار) -->
        <button class="menu-btn" id="menuBtn" aria-label="القائمة">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </nav>

    <!-- القائمة الجانبية المنسدلة من اليمين -->
    <div class="sidebar" id="sidebar">
        <button class="close-btn" id="closeBtn">&times;</button>
        <div class="sidebar-content">
            <div class="under-construction">⚠️ تحت الإنشاء</div>
        </div>
    </div>

    <!-- طبقة التظليل الخلفية عند فتح القائمة -->
    <div class="overlay" id="overlay"></div>

    <!-- كود الـ JavaScript للتحكم بالفتح والإغلاق -->
    <script>
        const menuBtn = document.getElementById('menuBtn');
        const sidebar = document.getElementById('sidebar');
        const closeBtn = document.getElementById('closeBtn');
        const overlay = document.getElementById('overlay');

        // فتح القائمة عند الضغط على زر الهامبرغر
        menuBtn.addEventListener('click', () => {
            sidebar.classList.add('open');
            overlay.classList.add('show');
        });

        // إغلاق القائمة عند الضغط على زر X
        closeBtn.addEventListener('click', () => {
            sidebar.classList.remove('open');
            overlay.classList.remove('show');
        });

        // إغلاق القائمة عند الضغط في أي مكان خارجها (على التظليل)
        overlay.addEventListener('click', () => {
            sidebar.classList.remove('open');
            overlay.classList.remove('show');
        });
    </script>

</body>
</html>
